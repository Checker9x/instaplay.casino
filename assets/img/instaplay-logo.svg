<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Dark Background -->
  <rect width="100%" height="100%" fill="#07090F" rx="12" />
  
  <!-- Glowing Hexagon / Chip Icon -->
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB703" />
      <stop offset="100%" stop-color="#F72585" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;800;900&amp;display=swap');
      .logo-text { font-family: 'Outfit', sans-serif; font-weight: 900; }
    </style>
  </defs>

  <g transform="translate(30, 20)" filter="url(#glow)">
    <polygon points="25,0 50,15 50,45 25,60 0,45 0,15" fill="none" stroke="url(#brandGrad)" stroke-width="4" />
    <polygon points="25,10 40,20 40,40 25,50 10,40 10,20" fill="url(#brandGrad)" opacity="0.9" />
    <!-- Lightning Bolt -->
    <path d="M28,15 L18,35 L26,35 L22,45 L34,25 L26,25 Z" fill="#ffffff" />
  </g>

  <!-- Typography -->
  <text x="100" y="65" class="logo-text" font-size="44" fill="#ffffff" letter-spacing="-0.02em">
    Insta<tspan fill="url(#brandGrad)">play</tspan><tspan fill="#F72585" font-size="44">.</tspan><tspan fill="#94A3B8" font-size="32" font-weight="600">ph</tspan>
  </text>
</svg>
