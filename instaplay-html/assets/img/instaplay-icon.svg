<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121829" />
      <stop offset="100%" stop-color="#040609" />
    </linearGradient>
    <linearGradient id="popGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB703" />
      <stop offset="100%" stop-color="#F72585" />
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="100" />
  
  <g transform="translate(156, 126)" filter="url(#neon)">
    <polygon points="100,0 200,60 200,180 100,240 0,180 0,60" fill="none" stroke="url(#popGrad)" stroke-width="16" />
    <polygon points="100,35 165,75 165,165 100,205 35,165 35,75" fill="url(#popGrad)" opacity="0.95" />
    <path d="M112,60 L65,150 L105,150 L85,200 150,110 105,110 Z" fill="#ffffff" />
  </g>
</svg>
